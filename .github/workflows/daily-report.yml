name: Daily High Pain Report

on:
  # Target: 10:00 PM IST (16:30 UTC).
  # Four attempts spread over 2 hrs — first one to run sets the Firebase flag, rest skip.
  schedule:
    - cron: '30 16 * * *'
    - cron: '0 17 * * *'
    - cron: '30 17 * * *'
    - cron: '0 18 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  report:
    name: Send Daily Funnel Report to Slack
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily report
        working-directory: scripts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: node daily-report.js
