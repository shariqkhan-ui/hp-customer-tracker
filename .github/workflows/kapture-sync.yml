name: Kapture Auto-Sync

on:
  # Target: 08:00 AM IST (02:30 UTC).
  # Four attempts spread over 2 hrs — first one to run sets the Firebase flag, rest skip.
  schedule:
    - cron: '30 2 * * *'
    - cron: '0 3 * * *'
    - cron: '30 3 * * *'
    - cron: '0 4 * * *'

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  sync:
    name: Sync Kapture → High Pain Tracker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Kapture sync
        working-directory: scripts
        env:
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTIFY_SLACK: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
        run: node kapture-sync.js
