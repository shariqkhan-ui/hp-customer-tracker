name: Kapture Auto-Sync

on:
  # Runs daily at 10:00 AM IST (04:30 UTC).
  # Slack notification is sent at end of kapture-sync.js using SLACK_BOT_TOKEN secret.
  schedule:
    - cron: '30 4 * * *'

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  sync:
    name: Sync Kapture → High Pain Tracker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Kapture sync
        working-directory: scripts
        env:
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTIFY_SLACK: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
        run: node kapture-sync.js
