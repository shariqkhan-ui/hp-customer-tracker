name: Kapture Auto-Sync

on:
  # Runs daily at 10:00 AM IST (04:30 UTC)
  schedule:
    - cron: '30 4 * * *'

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  sync:
    name: Sync Kapture → High Pain Tracker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Kapture sync
        working-directory: scripts
        env:
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
        run: node kapture-sync.js

      - name: Notify Slack
        if: github.event_name == 'schedule'
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-type: application/json" \
            -d '{"channel":"C0AHDR8H4CC","as_user":false,"username":"Shariq'\''s Slack Agent","text":"<!channel> New cases have been added in the tracker \u2014 check it here: https://shariqkhan-ui.github.io/hp-customer-tracker/"}'
