name: Kapture Auto-Sync

on:
  # Runs daily at 10:00 AM IST (04:30 UTC)
  schedule:
    - cron: '30 4 * * *'

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  sync:
    name: Sync Kapture → High Pain Tracker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Install Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Run Kapture sync
        working-directory: scripts
        env:
          KAPTURE_USERNAME: ${{ secrets.KAPTURE_USERNAME }}
          KAPTURE_PASSWORD: ${{ secrets.KAPTURE_PASSWORD }}
        run: node kapture-sync.js
