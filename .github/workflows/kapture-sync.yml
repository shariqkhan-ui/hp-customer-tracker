name: Kapture Auto-Sync

on:
  # Fallback schedule in case external cron fails (may run up to 2 hrs late)
  schedule:
    - cron: '30 4 * * *'

  # Triggered by cron-job.org at exactly 10:00 AM IST for precise timing.
  # Also allows manual UI triggers for testing (no Slack sent unless notify_slack=true).
  workflow_dispatch:
    inputs:
      notify_slack:
        description: 'Send Slack notification after sync (set true for cron-job.org trigger)'
        required: false
        default: 'false'

jobs:
  sync:
    name: Sync Kapture → High Pain Tracker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Kapture sync
        working-directory: scripts
        env:
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
        run: node kapture-sync.js

      - name: Notify Slack
        if: github.event_name == 'schedule' || github.event.inputs.notify_slack == 'true'
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-type: application/json" \
            -d '{"channel":"C0AHDR8H4CC","username":"Shariq'\''s Slack Agent","icon_url":"https://raw.githubusercontent.com/shariqkhan-ui/hp-customer-tracker/master/shariq-agent.jpg","text":"<!channel> New cases have been added in the tracker \u2014 check it here: https://shariqkhan-ui.github.io/hp-customer-tracker/"}'
